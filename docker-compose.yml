version: "3.9"

services:
  # -------------------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: open-verse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openverse}
      POSTGRES_USER: ${POSTGRES_USER:-openverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openverse} -d ${POSTGRES_DB:-openverse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-verse-net

  # -------------------------------------------------------
  # Open-Verse App
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-verse-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      # PostgreSQL mode
      USE_SQLITE: "false"
      DATABASE_URL: postgres://${POSTGRES_USER:-openverse}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openverse}
      # Security
      SESSION_SECRET: ${SESSION_SECRET}
      TRUST_PROXY: "true"
      # Optional external services
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      # Persist user-uploaded files
      - uploads_data:/app/uploads
    ports:
      - "${APP_PORT:-5000}:5000"
    networks:
      - open-verse-net

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  open-verse-net:
    driver: bridge
